# nfpm config for the Linux .deb package. VERSION is supplied via the environment
# in CI (nfpm expands ${...}). See https://nfpm.goreleaser.com.
name: hyperdeck-adapter
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Kindly Ops, LLC <opensource@kindlyops.com>
description: |
  Emulate a Blackmagic HyperDeck so a HyperDeck controller can drive a local
  media player that has no network control, by translating HyperDeck transport
  commands into keystrokes.
vendor: Kindly Ops, LLC
homepage: https://github.com/kindlyops/hyperdeck-adapter
license: Apache-2.0
contents:
  - src: ./build/linux/hyperdeck-adapter
    dst: /usr/bin/hyperdeck-adapter
  - src: ./build/linux/injcheck
    dst: /usr/bin/injcheck
  - src: ./examples/profiles.yaml
    dst: /usr/share/doc/hyperdeck-adapter/examples/profiles.yaml
  - src: ./README.md
    dst: /usr/share/doc/hyperdeck-adapter/README.md
  - src: ./LICENSE
    dst: /usr/share/doc/hyperdeck-adapter/LICENSE
