name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger: builds the version in src-tauri/tauri.conf.json and creates
  # a draft v<version> release (tauri-action expands __VERSION__).
  workflow_dispatch:
  # Called by version.yml on merge to main with a computed version, which is
  # written into tauri.conf.json at build time (not committed; tags are the
  # source of truth).
  workflow_call:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (written into tauri.conf.json)"
        required: true
        type: string
      notes:
        description: "Release body / notes (Markdown)"
        required: false
        type: string
        default: ""
      publish:
        description: "Flip the draft to a published release"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src-tauri
    env:
      # Updater bundle signing — release builds work without these, but the
      # in-app updater can only verify bundles signed with your key. See issue
      # #12 for how to generate and add them.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # When called with a computed version (auto-release on merge), write it
      # into tauri.conf.json so tauri-action tags and builds that version. Not
      # committed back — git tags remain the source of truth.
      - name: Set version from input
        if: inputs.version != ''
        shell: bash
        env:
          IN_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          jq --arg v "$IN_VERSION" '.version = $v' tauri.conf.json > "$tmp"
          mv "$tmp" tauri.conf.json
          echo "Set tauri.conf.json version to $IN_VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Updater artifacts require the signing key; without it, disable them so the
      # bundler doesn't try to sign with an empty key. Activates automatically
      # once TAURI_SIGNING_PRIVATE_KEY is configured.
      - name: Configure updater artifacts
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo 'UPDATER_CONFIG=--config {"bundle":{"createUpdaterArtifacts":false}}' >> "$GITHUB_ENV"
            echo "No updater signing key configured: updater artifacts disabled for this build."
          fi

      # --- macOS signing + notarization (no-op until secrets exist) ---
      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # --- Windows Authenticode (no-op until secrets exist) ---
      - name: Import Windows code-signing certificate
        if: matrix.platform == 'windows-latest' && env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP cert.pfx
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          echo "WIN_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      # Tauri treats a set-but-empty APPLE_SIGNING_IDENTITY as "sign with identity
      # \"\"" and fails; only export the Apple env when secrets exist so unsigned
      # builds fall back to ad-hoc signing.
      - name: Configure Apple signing
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SECRET_APPLE_SIGNING_IDENTITY" ]; then
            {
              echo "APPLE_SIGNING_IDENTITY=$SECRET_APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$SECRET_APPLE_ID"
              echo "APPLE_PASSWORD=$SECRET_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$SECRET_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple signing identity configured: app will be ad-hoc signed."
          fi

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: v__VERSION__
          releaseName: "HyperDeck Adapter v__VERSION__"
          releaseBody: >-
            ${{ inputs.notes != '' && inputs.notes || 'See the assets below to download and install. Installers are unsigned until code-signing credentials are configured; macOS Gatekeeper and Windows SmartScreen may warn on first launch.' }}
          releaseDraft: true
          prerelease: false
          args: >-
            ${{ matrix.args }}
            ${{ env.UPDATER_CONFIG }}
            ${{ env.WIN_CERT_THUMBPRINT != '' && format('--config {{"bundle":{{"windows":{{"certificateThumbprint":"{0}"}}}}}}', env.WIN_CERT_THUMBPRINT) || '' }}

  # Auto-release path only: flip the draft to published once both platform builds
  # have uploaded their assets. Manual dispatch / tag-push leave publish unset, so
  # those releases stay drafts for review.
  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Publish the release
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "v$VERSION" --repo "$GITHUB_REPOSITORY" --draft=false
