name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger: builds the version in src-tauri/tauri.conf.json and creates
  # a draft v<version> release.
  workflow_dispatch:
  # Called by version.yml on merge to main with a computed version, which is
  # written into tauri.conf.json at build time (not committed; tags are the
  # source of truth).
  workflow_call:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (written into tauri.conf.json)"
        required: true
        type: string
      notes:
        description: "Release body / notes (Markdown)"
        required: false
        type: string
        default: ""
      publish:
        description: "Flip the draft to a published release"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  # Pre-create the draft release once so the parallel matrix builds upload to it
  # by releaseId. Creating-by-tag from multiple matrix jobs races and can produce
  # duplicate/partial releases (tauri-action#914), which is unsafe on the
  # auto-publish path.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Resolve the version for every trigger: workflow_call input, then a pushed
      # v* tag, else the committed tauri.conf.json version (manual dispatch).
      - id: v
        shell: bash
        env:
          IN_VERSION: ${{ inputs.version }}
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ -n "$IN_VERSION" ]; then
            version="$IN_VERSION"
          elif [ "${GH_REF#refs/tags/v}" != "$GH_REF" ]; then
            version="${GH_REF#refs/tags/v}"
          else
            version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"

      - id: create
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          VERSION: ${{ steps.v.outputs.version }}
          IN_NOTES: ${{ inputs.notes }}
        with:
          script: |
            const version = process.env.VERSION;
            const tag = `v${version}`;
            const notes = (process.env.IN_NOTES && process.env.IN_NOTES.length)
              ? process.env.IN_NOTES
              : 'See the assets below to download and install.\n\nInstallers are unsigned until code-signing credentials are configured; macOS Gatekeeper and Windows SmartScreen may warn on first launch.';
            const { owner, repo } = context.repo;
            // Reuse an existing release for this tag so re-runs are idempotent
            // (listReleases includes drafts; getReleaseByTag does not).
            const releases = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 });
            const existing = releases.find((r) => r.tag_name === tag);
            if (existing) {
              core.info(`Reusing existing release ${existing.id} for ${tag}`);
              return existing.id;
            }
            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `HyperDeck Adapter ${tag}`,
              body: notes,
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release ${data.id} for ${tag}`);
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src-tauri
    env:
      # Updater bundle signing — release builds work without these, but the
      # in-app updater can only verify bundles signed with your key. See issue
      # #12 for how to generate and add them.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Build the resolved version so the bundle/installer version matches the
      # release tag on every trigger. Not committed — git tags are the source of
      # truth.
      - name: Set version
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > "$tmp"
          mv "$tmp" tauri.conf.json
          echo "Set tauri.conf.json version to $VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Updater artifacts require the signing key; without it, disable them so the
      # bundler doesn't try to sign with an empty key. Activates automatically
      # once TAURI_SIGNING_PRIVATE_KEY is configured.
      - name: Configure updater artifacts
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo 'UPDATER_CONFIG=--config {"bundle":{"createUpdaterArtifacts":false}}' >> "$GITHUB_ENV"
            echo "No updater signing key configured: updater artifacts disabled for this build."
          fi

      # --- macOS signing + notarization (no-op until secrets exist) ---
      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # --- Windows Authenticode (no-op until secrets exist) ---
      - name: Import Windows code-signing certificate
        if: matrix.platform == 'windows-latest' && env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP cert.pfx
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          echo "WIN_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      # Tauri treats a set-but-empty APPLE_SIGNING_IDENTITY as "sign with identity
      # \"\"" and fails; only export the Apple env when secrets exist so unsigned
      # builds fall back to ad-hoc signing.
      - name: Configure Apple signing
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SECRET_APPLE_SIGNING_IDENTITY" ]; then
            {
              echo "APPLE_SIGNING_IDENTITY=$SECRET_APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$SECRET_APPLE_ID"
              echo "APPLE_PASSWORD=$SECRET_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$SECRET_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple signing identity configured: app will be ad-hoc signed."
          fi

      # Uploads bundles to the pre-created draft release by id (no tag race).
      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: >-
            ${{ matrix.args }}
            ${{ env.UPDATER_CONFIG }}
            ${{ env.WIN_CERT_THUMBPRINT != '' && format('--config {{"bundle":{{"windows":{{"certificateThumbprint":"{0}"}}}}}}', env.WIN_CERT_THUMBPRINT) || '' }}

  # Auto-release path only: flip the draft to published once both platform builds
  # have uploaded their assets. Manual dispatch / tag-push leave publish unset, so
  # those releases stay drafts for review.
  publish:
    needs: [create-release, build]
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });
            core.info(`Published release ${process.env.RELEASE_ID}`);
