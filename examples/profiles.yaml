# Example hyperdeck-adapter profiles.
#
# Copy to your OS config directory (default the adapter looks for):
#   macOS:   ~/Library/Application Support/hyperdeck-adapter/profiles.yaml
#   Windows: %AppData%\hyperdeck-adapter\profiles.yaml
#
# Tip: run `injcheck list <name>` to discover the exact window owner / process
# name for a running app, then put that in match.process.

profiles:
  # Example Player on macOS is an iOS ("Designed for iPad") app; its window owner
  # name is "Example Player" (with a space). Verified on macOS: background injection
  # works (CGEventPostToPid), so transport control does not steal foreground
  # focus. Space toggles play/pause (hence play_toggle, and there is no discrete
  # stop key so Stop pauses via Space). next/prev use Command on macOS per the player
  # Library's documented shortcuts.
  - id: example_player
    match: { process: ["Example Player"] }
    injection: background
    keymap: { play: "space", next: "cmd+right", prev: "cmd+left" }
    play_toggle: true
    clip_source: { type: positional, count: 50 }
    state: { type: none }

  # VLC: Space is a play/pause toggle (play_toggle), but 's' is a discrete stop,
  # so Stop uses the discrete stop key. VLC does not persist its live playlist to
  # a known file, so clips are positional slots driven by next/previous.
  # Keys below are VLC's macOS defaults (verified): play/pause Space, next
  # Command+Right, previous Command+Left, stop Command+. — Windows VLC uses
  # different keys (e.g. n / p / s); set those in a Windows profile.
  # Background injection (CGEventPostToPid) is confirmed working, so transport
  # control does not steal foreground focus.
  - id: vlc
    match: { process: ["VLC", "vlc", "vlc.exe"], title_regex: "VLC media player" }
    injection: background
    keymap: { play: "space", stop: "cmd+.", next: "cmd+right", prev: "cmd+left" }
    play_toggle: true
    clip_source: { type: positional, count: 50 }
    state: { type: title_regex, playing: ".+ - VLC media player" }
    homing: ["cmd+."]

  # Mitti (macOS) has discrete cue transport keys; it needs foreground focus.
  - id: mitti
    match: { process: ["Mitti"] }
    injection: focus
    keymap:
      play: "enter"
      pause: "space"
      stop: "cmd+esc"
      next: "cmd+down"
      prev: "cmd+up"
    clip_source: { type: mitti }
    state: { type: none }
